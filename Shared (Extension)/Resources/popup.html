<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <script src="popup.js" defer></script>
</head>
<body>
    <main class="popup-shell">
        <section class="settings-card">
            <label class="toggle-row" for="enabled-toggle">
                <span data-i18n="popup_enable_conversion">Enable Conversion</span>
                <span class="toggle">
                    <input id="enabled-toggle" type="checkbox" role="switch">
                    <span class="track" aria-hidden="true"></span>
                </span>
            </label>

            <div class="field-grid">
                <label class="field" for="input-select">
                    <span data-i18n="popup_input_text">Input Text</span>
                    <select id="input-select"></select>
                </label>

                <label class="field" for="output-select">
                    <span data-i18n="popup_output_text">Output Text</span>
                    <select id="output-select"></select>
                </label>
            </div>

            <label class="toggle-row" for="font-override-toggle">
                <span data-i18n="popup_override_font">Override Region Font</span>
                <span class="toggle">
                    <input id="font-override-toggle" type="checkbox" role="switch">
                    <span class="track" aria-hidden="true"></span>
                </span>
            </label>

            <p id="status" role="status" aria-live="polite"></p>
        </section>
    </main>
</body>
</html>
